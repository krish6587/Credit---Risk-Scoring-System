<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Credit Risk Scoring System</title>
    <meta name="description" content="AI-powered Credit Risk Scoring System to predict loan approvals.">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Credit Risk Predictor</h1>
            <p>Enter applicant details to assess credit risk instantly.</p>
        </header>
        
        <main>
            <div class="card">
                <form id="prediction-form">
                    <div class="form-group">
                        <label for="age">Age</label>
                        <input type="number" id="age" name="age" required min="18" max="100" placeholder="e.g. 35">
                    </div>
                    
                    <div class="form-group">
                        <label for="income">Annual Income ($)</label>
                        <input type="number" id="income" name="income" required min="0" placeholder="e.g. 75000">
                    </div>
                    
                    <div class="form-group">
                        <label for="loan_amount">Loan Amount ($)</label>
                        <input type="number" id="loan_amount" name="loan_amount" required min="100" placeholder="e.g. 15000">
                    </div>
                    
                    <div class="form-group">
                        <label for="credit_score">Credit Score</label>
                        <input type="number" id="credit_score" name="credit_score" required min="300" max="850" placeholder="e.g. 720">
                    </div>
                    
                    <div class="form-group">
                        <label for="employment_length">Employment Length (Years)</label>
                        <input type="number" id="employment_length" name="employment_length" required min="0" max="50" placeholder="e.g. 5">
                    </div>
                    
                    <button type="submit" id="submit-btn">
                        <span class="btn-text">Assess Risk</span>
                        <div class="loader" id="loader" style="display: none;"></div>
                    </button>
                </form>
            </div>
            
            <div id="result-container" class="card result-card hidden">
                <h2>Prediction Result</h2>
                <div class="status-badge" id="status-badge">Processing...</div>
                <div class="confidence">
                    <span>Confidence Score:</span>
                    <strong id="confidence-score">0%</strong>
                </div>
                <button id="reset-btn" class="secondary-btn">New Assessment</button>
            </div>
        </main>
    </div>
    
    <script src="/static/app.js"></script>
</body>
</html>
